<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funding Rate Farming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0b0e14; color: #c9d1d9; font-family: 'Inter', sans-serif;}
        .nav-link { margin-right: 1.5rem; color: #58a6ff; font-weight: 500; transition: color 0.3s;}
        .nav-link:hover { color: #ffffff; }
    </style>
</head>
<body class="bg-[#0b0e14]">
    <nav class="p-5 border-b border-gray-800 bg-[#131722] flex justify-between items-center shadow-md">
        <div class="flex items-center">
            <span class="text-2xl font-black mr-8 text-white tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">ALPHA FARM</span>
            <a href="/" class="nav-link text-sm">Dashboard</a>
            <a href="/portfolio" class="nav-link text-sm">Portfolio</a>
            <a href="/history" class="nav-link text-sm">History</a>
        </div>
        <div>
            <a href="/settings" class="nav-link text-sm bg-gray-800 px-4 py-2 rounded-lg hover:bg-gray-700">Settings</a>
        </div>
    </nav>
    <div class="p-8 max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
