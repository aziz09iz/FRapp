{% extends "base.html" %}

{% block content %}
<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h2 class="text-4xl font-black text-white bg-clip-text text-transparent bg-gradient-to-r from-blue-300 to-emerald-300">Live Opportunities</h2>
        <p class="text-sm text-gray-400 mt-1">Cross-exchange funding rate arbitrage scanner</p>
    </div>
    
    <div class="flex space-x-4">
        <div class="bg-gradient-to-br from-[#1e222d] to-[#131722] px-5 py-3 rounded-xl shadow-lg border border-gray-700/50">
            <div class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-1 flex justify-between"><span class="mr-6">Bybit Limit</span><span id="lat-bybit" class="text-indigo-400">0</span><span class="text-gray-600 text-[10px]">ms</span></div>
            <div class="text-gray-200 font-mono text-xl"><span class="text-emerald-400">$</span><span id="bal-bybit">0.00</span></div>
        </div>
        <div class="bg-gradient-to-br from-[#1e222d] to-[#131722] px-5 py-3 rounded-xl shadow-lg border border-gray-700/50">
            <div class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-1 flex justify-between"><span class="mr-6">Gate.io Limit</span><span id="lat-gate" class="text-indigo-400">0</span><span class="text-gray-600 text-[10px]">ms</span></div>
            <div class="text-gray-200 font-mono text-xl"><span class="text-emerald-400">$</span><span id="bal-gate">0.00</span></div>
        </div>
    </div>
</div>

<div class="mb-8 p-6 bg-[#131722]/80 backdrop-blur-md rounded-2xl shadow-xl border border-gray-800 flex flex-wrap gap-6 items-end relative overflow-hidden">
    <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
    <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Trade Size (USDT)</label>
        <input type="number" id="trade-size" value="100" title="Ignored if Dynamic Sizing is set in Settings" class="w-32 bg-[#0b0e14] text-white px-4 py-2.5 rounded-lg border border-gray-800 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
    </div>
    <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Leverage</label>
        <input type="number" id="trade-leverage" value="10" class="w-24 bg-[#0b0e14] text-white px-4 py-2.5 rounded-lg border border-gray-800 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
    </div>
    <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Margin Mode</label>
        <select id="trade-margin" class="w-32 bg-[#0b0e14] text-white px-4 py-2.5 rounded-lg border border-gray-800 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors appearance-none">
            <option value="cross">Cross</option>
            <option value="isolated">Isolated</option>
        </select>
    </div>
    <div class="text-xs text-indigo-400 ml-auto pb-2 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="auto-status">Autopilot is OFF</span>
    </div>
</div>

<div class="overflow-x-auto bg-[#131722]/80 backdrop-blur-md rounded-2xl shadow-xl border border-gray-800">
    <table class="w-full text-left border-collapse">
        <thead class="bg-[#1e222d] border-b border-gray-800 text-xs text-gray-400 font-medium uppercase tracking-wider">
            <tr>
                <th class="p-5">Asset</th>
                <th class="p-5">Resets In</th>
                <th class="p-5">Bybit FR</th>
                <th class="p-5">Gate.io FR</th>
                <th class="p-5">Delta Δ</th>
                <th class="p-5">APR Projected</th>
                <th class="p-5">Price Spread</th>
                <th class="p-5 text-right">Execute</th>
            </tr>
        </thead>
        <tbody id="table-body" class="text-sm text-gray-200">
            <tr><td colspan="8" class="p-8 text-center text-gray-500">Scanning endpoints...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let fundingTimes = {};

    function updateCountdowns() {
        const now = new Date().getTime();
        for (const [symbol, targetMs] of Object.entries(fundingTimes)) {
            const el = document.getElementById(`countdown-${symbol}`);
            if (!el) continue;
            
            let diff = targetMs - now;
            if (targetMs <= 0 || diff <= 0) {
                const d = new Date();
                const h = d.getUTCHours();
                const nextH = (Math.floor(h / 8) + 1) * 8;
                const nextDate = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), nextH, 0, 0));
                diff = nextDate.getTime() - d.getTime();
            }
            
            if (diff > 0) {
                const h = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            } else {
                el.innerText = "00:00:00";
            }
        }
    }
    setInterval(updateCountdowns, 1000);

    async function checkSettings() {
        try {
            const res = await fetch("/api/settings");
            const set = await res.json();
            if (set.autopilot_enabled) {
                document.getElementById('auto-status').innerText = `Autopilot ENABLED limit ${set.autopilot_min_apr}% (DynSizing: ${set.trade_size_pct}%)`;
                document.getElementById('auto-status').className = "text-red-400 font-bold ml-auto pb-2 flex items-center gap-2 animate-pulse";
            }
        } catch(e) {}
    }

    async function fetchData() {
        try {
            const res = await fetch("/api/dashboard");
            const json = await res.json();
            
            document.getElementById("lat-bybit").innerText = json.latency.bybit;
            document.getElementById("lat-gate").innerText = json.latency.gateio;
            document.getElementById("bal-bybit").innerText = (json.balances.bybit || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById("bal-gate").innerText = (json.balances.gateio || 0).toLocaleString(undefined, {minimumFractionDigits: 2});

            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            
            if (json.data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-8 text-center text-gray-500">No cross-exchange alignments found.</td></tr>`;
            }
            
            json.data.forEach(item => {
                fundingTimes[item.symbol] = item.next_funding_time || 0;

                const bFR = (item.bybit_fr * 100).toFixed(4) + '%';
                const gFR = (item.gate_fr * 100).toFixed(4) + '%';
                const diffPerc = (Math.abs(item.bybit_fr - item.gate_fr) * 100).toFixed(4) + '%';
                
                const spreadText = item.spread !== 0 ? item.spread.toFixed(6) : "0.000000";
                
                const bColor = item.bybit_fr > 0 ? 'text-emerald-400' : (item.bybit_fr < 0 ? 'text-rose-400' : 'text-gray-400');
                const gColor = item.gate_fr > 0 ? 'text-emerald-400' : (item.gate_fr < 0 ? 'text-rose-400' : 'text-gray-400');
                
                const gapBarWidth = Math.min(100, (item.apr / 10)); // Visual indicator
                
                const tr = document.createElement("tr");
                tr.className = "border-b border-gray-800 hover:bg-[#1a1e29] transition-colors";
                tr.innerHTML = `
                    <td class="p-5 font-bold text-white flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center text-xs text-blue-300 font-black">${item.symbol.charAt(0)}</div>
                        ${item.symbol.replace('USDT', '')}<span class="text-gray-500 text-xs">USDT</span>
                    </td>
                    <td class="p-5 text-gray-400 font-mono tracking-widest" id="countdown-${item.symbol}">--:--:--</td>
                    <td class="p-5 font-mono ${bColor}">${bFR}</td>
                    <td class="p-5 font-mono ${gColor}">${gFR}</td>
                    <td class="p-5 font-bold text-indigo-400 font-mono">${diffPerc}</td>
                    <td class="p-5">
                       <div class="flex items-center gap-3">
                           <span class="font-bold text-amber-300 tracking-wider">${item.apr.toFixed(2)}%</span>
                           <div class="w-16 h-1 bg-gray-800 rounded-full overflow-hidden hidden md:block">
                               <div class="bg-gradient-to-r from-amber-600 to-amber-300 h-full" style="width: ${gapBarWidth}%"></div>
                           </div>
                       </div>
                    </td>
                    <td class="p-5 font-mono ${item.spread > 0 ? 'text-emerald-400' : (item.spread < 0 ? 'text-rose-400' : 'text-gray-400')}">${spreadText}</td>
                    <td class="p-5 text-right space-x-2">
                        <button class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 border-b-2 border-indigo-800 active:border-b-0 active:mt-0.5 rounded-lg text-xs font-bold transition-all shadow-lg shadow-indigo-900/20" onclick="submitPosition('${item.symbol}', ${item.bybit_fr}, ${item.gate_fr}, 'instant')">BUY</button>
                        <button class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 border-b-2 border-amber-800 active:border-b-0 active:mt-0.5 rounded-lg text-xs font-bold transition-all shadow-lg shadow-amber-900/20" onclick="submitPosition('${item.symbol}', ${item.bybit_fr}, ${item.gate_fr}, 'delay')">WAIT ≥ 0</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            updateCountdowns();
        } catch (e) {
            console.error("Dashboard fetch error", e);
        }
    }

    async function submitPosition(symbol, bybitFr, gateFr, mode) {
        const size = parseFloat(document.getElementById('trade-size').value) || 100;
        const lev = parseInt(document.getElementById('trade-leverage').value) || 10;
        const margin = document.getElementById('trade-margin').value;
        
        let longEx = "bybit";
        let shortEx = "gateio";
        if (bybitFr > gateFr) {
            longEx = "gateio";
            shortEx = "bybit";
        }
        
        try {
            const res = await fetch("/api/execute", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    symbol: symbol,
                    size_usdt: size,
                    leverage: lev,
                    margin_mode: margin,
                    long_exchange: longEx,
                    short_exchange: shortEx,
                    mode: mode
                })
            });
            const ans = await res.json();
            alert(ans.message);
        } catch(e) {
            alert("Failed to send order.");
            console.error(e);
        }
    }

    checkSettings();
    fetchData();
    setInterval(fetchData, 5000);
</script>
{% endblock %}
