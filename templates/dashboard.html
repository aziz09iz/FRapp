{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-semibold">Top Funding Rates</h2>
    <div class="flex space-x-6 text-sm text-gray-400">
        <div><span class="font-bold text-green-400">Bybit Bal:</span> $<span id="bal-bybit" class="text-white font-mono">0.00</span> | Lat: <span id="lat-bybit" class="text-white font-mono">0</span> ms</div>
        <div><span class="font-bold text-green-400">Gate.io Bal:</span> $<span id="bal-gate" class="text-white font-mono">0.00</span> | Lat: <span id="lat-gate" class="text-white font-mono">0</span> ms</div>
    </div>
</div>

<div class="mb-6 p-4 bg-gray-800 rounded-lg flex flex-wrap gap-4 items-end">
    <div>
        <label class="block text-xs text-gray-400 mb-1">Trade Size (USDT)</label>
        <input type="number" id="trade-size" value="100" class="w-32 bg-gray-700 text-white px-3 py-2 rounded text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-xs text-gray-400 mb-1">Leverage</label>
        <input type="number" id="trade-leverage" value="10" class="w-24 bg-gray-700 text-white px-3 py-2 rounded text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-xs text-gray-400 mb-1">Margin Mode</label>
        <select id="trade-margin" class="w-28 bg-gray-700 text-white px-3 py-2 rounded text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
            <option value="cross">Cross</option>
            <option value="isolated">Isolated</option>
        </select>
    </div>
</div>

<div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
        <thead class="bg-gray-800 text-sm">
            <tr>
                <th class="p-3 border-b border-gray-700">Symbol</th>
                <th class="p-3 border-b border-gray-700">Next Funding</th>
                <th class="p-3 border-b border-gray-700">Bybit FR</th>
                <th class="p-3 border-b border-gray-700">Gate FR</th>
                <th class="p-3 border-b border-gray-700">Diff</th>
                <th class="p-3 border-b border-gray-700">APR</th>
                <th class="p-3 border-b border-gray-700">Spread</th>
                <th class="p-3 border-b border-gray-700 text-center">Action</th>
            </tr>
        </thead>
        <tbody id="table-body" class="text-sm">
            <tr><td colspan="8" class="p-4 text-center text-gray-500">Loading data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let fundingTimes = {};

    function updateCountdowns() {
        const now = new Date().getTime();
        for (const [symbol, targetMs] of Object.entries(fundingTimes)) {
            const el = document.getElementById(`countdown-${symbol}`);
            if (!el) continue;
            
            let diff = targetMs - now;
            if (targetMs <= 0 || diff <= 0) {
                const d = new Date();
                const h = d.getUTCHours();
                const nextH = (Math.floor(h / 8) + 1) * 8;
                const nextDate = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), nextH, 0, 0));
                diff = nextDate.getTime() - d.getTime();
            }
            
            if (diff > 0) {
                const h = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            } else {
                el.innerText = "00:00:00";
            }
        }
    }
    setInterval(updateCountdowns, 1000);

    async function fetchData() {
        try {
            const res = await fetch("/api/dashboard");
            const json = await res.json();
            
            document.getElementById("lat-bybit").innerText = json.latency.bybit;
            document.getElementById("lat-gate").innerText = json.latency.gateio;
            document.getElementById("bal-bybit").innerText = (json.balances.bybit || 0).toFixed(2);
            document.getElementById("bal-gate").innerText = (json.balances.gateio || 0).toFixed(2);

            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            
            if (json.data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-4 text-center text-gray-500">No data available.</td></tr>`;
            }
            
            json.data.forEach(item => {
                fundingTimes[item.symbol] = item.next_funding_time || 0;

                const bFR = (item.bybit_fr * 100).toFixed(4) + '%';
                const gFR = (item.gate_fr * 100).toFixed(4) + '%';
                const diffPerc = (Math.abs(item.bybit_fr - item.gate_fr) * 100).toFixed(4) + '%';
                
                const spreadText = item.spread !== 0 ? item.spread.toFixed(6) : "0.000000";
                
                const bColor = item.bybit_fr > 0 ? 'text-green-400' : (item.bybit_fr < 0 ? 'text-red-400' : 'text-gray-300');
                const gColor = item.gate_fr > 0 ? 'text-green-400' : (item.gate_fr < 0 ? 'text-red-400' : 'text-gray-300');
                
                const tr = document.createElement("tr");
                tr.className = "border-b border-gray-800 hover:bg-gray-800 transition-colors";
                tr.innerHTML = `
                    <td class="p-3 font-bold">${item.symbol}</td>
                    <td class="p-3 text-gray-400 font-mono" id="countdown-${item.symbol}">--:--:--</td>
                    <td class="p-3 ${bColor}">${bFR}</td>
                    <td class="p-3 ${gColor}">${gFR}</td>
                    <td class="p-3 text-blue-300">${diffPerc}</td>
                    <td class="p-3 text-purple-300">${item.apr.toFixed(2)}%</td>
                    <td class="p-3 font-mono ${item.spread > 0 ? 'text-green-300' : (item.spread < 0 ? 'text-red-300' : 'text-gray-300')}">${spreadText}</td>
                    <td class="p-3 text-center space-x-2">
                        <button class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded text-xs transition" onclick="submitPosition('${item.symbol}', ${item.bybit_fr}, ${item.gate_fr}, 'instant')">Enter</button>
                        <button class="bg-yellow-600 hover:bg-yellow-500 text-white px-3 py-1 rounded text-xs transition" onclick="submitPosition('${item.symbol}', ${item.bybit_fr}, ${item.gate_fr}, 'delay')">Delay</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            updateCountdowns();
        } catch (e) {
            console.error("Dashboard fetch error", e);
        }
    }

    async function submitPosition(symbol, bybitFr, gateFr, mode) {
        const size = parseFloat(document.getElementById('trade-size').value) || 100;
        const lev = parseInt(document.getElementById('trade-leverage').value) || 10;
        const margin = document.getElementById('trade-margin').value;
        
        let longEx = "bybit";
        let shortEx = "gateio";
        if (bybitFr > gateFr) {
            longEx = "gateio";
            shortEx = "bybit";
        }
        
        try {
            const res = await fetch("/api/execute", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    symbol: symbol,
                    size_usdt: size,
                    leverage: lev,
                    margin_mode: margin,
                    long_exchange: longEx,
                    short_exchange: shortEx,
                    mode: mode
                })
            });
            const ans = await res.json();
            alert(ans.message);
        } catch(e) {
            alert("Failed to send order.");
            console.error(e);
        }
    }

    fetchData();
    setInterval(fetchData, 5000);
</script>
{% endblock %}
