{% extends "base.html" %}

{% block content %}
<h2 class="text-2xl font-semibold mb-6">API Settings</h2>

<form class="max-w-xl mx-auto bg-gray-800 p-6 rounded border border-gray-700" onsubmit="event.preventDefault(); alert('Settings saved!');">
    <div class="mb-4">
        <label class="block text-sm font-bold mb-2">Bybit API Key</label>
        <input type="text" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200" placeholder="Enter Bybit API Key">
    </div>
    <div class="mb-6">
        <label class="block text-sm font-bold mb-2">Bybit Secret</label>
        <input type="password" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200" placeholder="Enter Bybit Secret">
    </div>

    <div class="mb-4 text-gray-500 border-b border-gray-700"></div>

    <div class="mb-4">
        <label class="block text-sm font-bold mb-2">Gate.io API Key</label>
        <input type="text" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200" placeholder="Enter Gate.io API Key">
    </div>
    <div class="mb-6">
        <label class="block text-sm font-bold mb-2">Gate.io Secret</label>
        <input type="password" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200" placeholder="Enter Gate.io Secret">
    </div>

    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">Save Settings</button>
</form>
{% endblock %}
