{% extends "base.html" %}

{% block content %}
<h2 class="text-2xl font-semibold mb-6">API Settings</h2>

<form id="settings-form" class="max-w-xl mx-auto bg-gray-800 p-6 rounded border border-gray-700" onsubmit="saveSettings(event)">
    <div id="alert-msg" class="hidden mb-4 p-3 rounded text-sm font-bold"></div>
    <div class="mb-4">
        <label class="block text-sm font-bold mb-2">Bybit API Key</label>
        <input id="bybit-key" type="text" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200" placeholder="Enter Bybit API Key">
    </div>
    <div class="mb-6">
        <label class="block text-sm font-bold mb-2">Bybit Secret</label>
        <input id="bybit-secret" type="password" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200" placeholder="Enter Bybit Secret">
    </div>

    <div class="mb-4 text-gray-500 border-b border-gray-700"></div>

    <div class="mb-4">
        <label class="block text-sm font-bold mb-2">Gate.io API Key</label>
        <input id="gate-key" type="text" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200 focus:outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Enter Gate.io API Key">
    </div>
    <div class="mb-6">
        <label class="block text-sm font-bold mb-2">Gate.io Secret</label>
        <input id="gate-secret" type="password" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200 focus:outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Enter Gate.io Secret">
    </div>

    <div class="mb-4 text-gray-500 border-b border-gray-700"></div>
    <h3 class="text-lg font-bold mb-4 text-white">Risk & Automation</h3>

    <div class="flex items-center mb-4">
        <input id="autopilot" type="checkbox" class="w-5 h-5 text-blue-600 bg-gray-800 border-gray-600 rounded focus:ring-blue-500 focus:ring-2">
        <label class="ml-2 block text-sm font-bold">Enable Autopilot Mode (DANGER)</label>
    </div>
    
    <div class="grid grid-cols-3 gap-4 mb-4">
        <div>
            <label class="block text-xs font-bold mb-2">Autopilot Min APR (%)</label>
            <input id="min-apr" type="number" step="0.1" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200 focus:outline-none focus:ring-1 focus:ring-indigo-500">
        </div>
        <div>
            <label class="block text-xs font-bold mb-2">Dyn. Trade Size (%)</label>
            <input id="trade-pct" type="number" step="0.1" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200 focus:outline-none focus:ring-1 focus:ring-indigo-500" placeholder="0 = fixed USDT">
        </div>
        <div>
            <label class="block text-xs font-bold mb-2">Margin Alert limit (%)</label>
            <input id="margin-warn" type="number" step="0.1" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200 focus:outline-none focus:ring-1 focus:ring-indigo-500">
        </div>
    </div>

    <div class="mb-4 text-gray-500 border-b border-gray-700"></div>

    <div class="mb-4">
        <label class="block text-sm font-bold mb-2">Telegram Bot Token</label>
        <input id="tg-token" type="password" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200" placeholder="Enter Telegram Bot Token">
    </div>
    <div class="mb-6">
        <label class="block text-sm font-bold mb-2">Telegram Chat ID</label>
        <input id="tg-chat" type="text" class="w-full p-2 bg-gray-900 border border-gray-600 rounded text-gray-200" placeholder="Enter Telegram Chat ID">
    </div>

    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">Save Settings</button>
</form>

<script>
    async function loadSettings() {
        try {
            const res = await fetch("/api/settings");
            const data = await res.json();
            document.getElementById('bybit-key').value = data.bybit_api_key || "";
            document.getElementById('bybit-secret').value = data.bybit_secret || "";
            document.getElementById('gate-key').value = data.gate_api_key || "";
            document.getElementById('gate-secret').value = data.gate_secret || "";
            document.getElementById('tg-token').value = data.tg_bot_token || "";
            document.getElementById('tg-chat').value = data.tg_chat_id || "";
            document.getElementById('autopilot').checked = data.autopilot_enabled;
            document.getElementById('min-apr').value = data.autopilot_min_apr;
            document.getElementById('trade-pct').value = data.trade_size_pct;
            document.getElementById('margin-warn').value = data.margin_alert_threshold;
        } catch (e) {
            console.error("Failed to load settings", e);
        }
    }

    async function saveSettings(e) {
        e.preventDefault();
        const payload = {
            bybit_api_key: document.getElementById('bybit-key').value,
            bybit_secret: document.getElementById('bybit-secret').value,
            gate_api_key: document.getElementById('gate-key').value,
            gate_secret: document.getElementById('gate-secret').value,
            tg_bot_token: document.getElementById('tg-token').value,
            tg_chat_id: document.getElementById('tg-chat').value,
            autopilot_enabled: document.getElementById('autopilot').checked,
            autopilot_min_apr: parseFloat(document.getElementById('min-apr').value) || 300,
            trade_size_pct: parseFloat(document.getElementById('trade-pct').value) || 0,
            margin_alert_threshold: parseFloat(document.getElementById('margin-warn').value) || 80
        };

        const alertBox = document.getElementById('alert-msg');
        try {
            const res = await fetch("/api/settings", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if (data.status === "ok") {
                alertBox.className = "mb-4 p-3 rounded text-sm font-bold bg-green-900 text-green-200 block";
                alertBox.innerText = data.message;
                setTimeout(() => alertBox.classList.add('hidden'), 3000);
            }
        } catch (e) {
            alertBox.className = "mb-4 p-3 rounded text-sm font-bold bg-red-900 text-red-200 block";
            alertBox.innerText = "Error saving settings.";
        }
    }

    // Load on start
    window.addEventListener('DOMContentLoaded', loadSettings);
</script>
{% endblock %}
